trainer: grpo
model: Qwen/Qwen2.5-1.5B-Instruct
dataset: openai/gsm8k
dataset_config: main
run_name: smoke__grpo_qwen1.5b_math

max_steps: 2
batch_size: 4
gradient_accumulation_steps: 1
learning_rate: 1e-6
max_completion_length: 256
num_generations: 4

bf16: false
logging_steps: 1
save_steps: 999999
report_to: none

column_mapping:
  question: prompt
  answer: solution

reward_functions:
  - exact_match
